name: Modern Editor
version: 2.0.3
description: "Modern visual WYSIWYG editor (based on TinyMCE) for page content, compatible with Admin Next (Grav 2.0)."
icon: edit
author:
  name: PeopleInside
  email: tickets@peopleinside-it.p.tawk.email
homepage: https://github.com/PeopleInside/modern-editor
keywords: grav, plugin, editor, wysiwyg, admin-next, visual editor
bugs: https://github.com/PeopleInside/modern-editor/issues
license: GPL

compatibility:
  - "2.0"

rules:
  gpm:
    grav:
      version: '>=2.0.0'

dependencies:
  - { name: grav, version: '>=2.0.0' }

form:
  fields:
    enabled:
      type: toggle
      label: PLUGIN_MODERN_EDITOR.ENABLED
      help: PLUGIN_MODERN_EDITOR.ENABLED_HELP
      default: true
      highlight: 1
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    editor_source:
      type: select
      label: PLUGIN_MODERN_EDITOR.EDITOR_SOURCE
      help: PLUGIN_MODERN_EDITOR.EDITOR_SOURCE_HELP
      default: local
      options:
        cdn: Cloud CDN (jsDelivr)
        local: Local (Self-hosted)

    ui_language:
      type: select
      label: PLUGIN_MODERN_EDITOR.UI_LANGUAGE
      help: PLUGIN_MODERN_EDITOR.UI_LANGUAGE_HELP
      default: auto
      options:
        auto: PLUGIN_MODERN_EDITOR.UI_LANGUAGE_AUTO
        it: Italiano
        en: English

    local_status:
      type: moderneditorstatus
      label: PLUGIN_MODERN_EDITOR.LOCAL_STATUS

    height:
      type: text
      label: PLUGIN_MODERN_EDITOR.HEIGHT
      help: PLUGIN_MODERN_EDITOR.HEIGHT_HELP
      default: "500"
      validate:
        type: number

    menubar:
      type: toggle
      label: PLUGIN_MODERN_EDITOR.MENUBAR
      help: PLUGIN_MODERN_EDITOR.MENUBAR_HELP
      default: true
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    plugins:
      type: text
      label: PLUGIN_MODERN_EDITOR.PLUGINS
      help: PLUGIN_MODERN_EDITOR.PLUGINS_HELP
      default: "lists link image table code fullscreen searchreplace media"

    toolbar:
      type: text
      label: PLUGIN_MODERN_EDITOR.TOOLBAR
      help: PLUGIN_MODERN_EDITOR.TOOLBAR_HELP
      default: "undo redo | blocks | bold italic underline forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist | link image media table | code fullscreen"
