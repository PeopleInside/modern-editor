name: Build Plugin Release

on:
  push:
    tags:
      - '*'  # Si attiva con qualsiasi tag (es. 1.1.6, 1.0.0, ecc.)
  workflow_dispatch: # Permette di lanciarla manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT

      - name: Create plugin zip
        run: |
          # Crea la cartella temporanea con il nome del plugin
          mkdir -p modern-editor
          
          # Copia tutti i file necessari nella cartella, escludendo quelli non utili
          rsync -av --progress ./ modern-editor/ \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .DS_Store \
            --exclude "*.log"
          
          # Crea lo zip con il nome versionato
          zip -r modern-editor-${{ steps.get_version.outputs.VERSION }}.zip modern-editor/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modern-editor-${{ steps.get_version.outputs.VERSION }}
          path: modern-editor-${{ steps.get_version.outputs.VERSION }}.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: modern-editor-${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
