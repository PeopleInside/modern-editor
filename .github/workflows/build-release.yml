name: Build Plugin Release

on:
  push:
    tags:
      - '*'  # Si attiva con qualsiasi tag (es. 1.1.6, 1.0.0, ecc.)
  workflow_dispatch: # Permette di lanciarla manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare plugin directory
        run: |
          # Crea la cartella con il nome ESATTO del plugin
          mkdir -p modern-editor
          
          # Copia tutti i file necessari nella cartella, escludendo quelli non utili
          # Aggiunto --exclude modern-editor per sicurezza, per evitare ricorsioni
          rsync -av --progress ./ modern-editor/ \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .DS_Store \
            --exclude "*.log" \
            --exclude modern-editor
          
      - name: Create plugin zip
        run: zip -r modern-editor.zip modern-editor/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modern-editor-zip
          path: modern-editor.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: modern-editor.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
