PLUGIN_MODERN_EDITOR:
  ENABLED: Attivo
  ENABLED_HELP: Abilita o disabilita l'editor visuale sul campo contenuto delle pagine.
  EDITOR_SOURCE: Sorgente script editor
  EDITOR_SOURCE_HELP: Scegli se caricare l'editor da una CDN Cloud pubblica o utilizzare una versione ospitata localmente sul tuo server.
  UI_LANGUAGE: Lingua editor / interfaccia admin
  UI_LANGUAGE_HELP: "Forza una lingua specifica per l'interfaccia dell'editor TinyMCE e per i banner di stato/aggiornamento di questo plugin, ignorando qualsiasi rilevamento automatico. Usa \"Automatica\" per provare a seguire la lingua dell'admin di Grav."
  UI_LANGUAGE_AUTO: "Automatica (segui Grav)"
  LOCAL_STATUS: Stato locale di TinyMCE
  HEIGHT: Altezza editor (px)
  HEIGHT_HELP: Altezza in pixel dell'area dell'editor visuale.
  MENUBAR: Mostra barra dei menu
  MENUBAR_HELP: Mostra la barra dei menu (File, Modifica, Inserisci, ecc.) oltre alla toolbar.
  PLUGINS: Plugin editor
  PLUGINS_HELP: "Elenco separato da spazi dei plugin TinyMCE da caricare (es. lists link image table code)."
  TOOLBAR: Toolbar
  TOOLBAR_HELP: "Configurazione della toolbar, secondo la sintassi ufficiale TinyMCE."
  MARKDOWN_ENABLED: Supporto Markdown
  MARKDOWN_ENABLED_HELP: "Se abilitato, l'editor converte il contenuto HTML della pagina in Markdown durante il salvataggio e viceversa al caricamento. Se disabilitato, l'editor funziona interamente in modalità HTML raw e le librerie marked e turndown non vengono caricate."
